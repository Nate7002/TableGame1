name: Feature request
description: Suggest an improvement or new feature
title: "[Feature]: "
labels: ["enhancement"]
body:
  - type: markdown
    attributes:
      value: |
        Suggest a feature that fits TableGame1's modular architecture. Check [ROADMAP.md](../../ROADMAP.md) first.

  - type: textarea
    id: problem
    attributes:
      label: Problem or opportunity
      description: What user or developer problem does this solve?
    validations:
      required: true

  - type: textarea
    id: proposal
    attributes:
      label: Proposed solution
      description: High-level idea. Implementation details optional.
    validations:
      required: true

  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
      description: Other approaches you thought about.

  - type: dropdown
    id: area
    attributes:
      label: Area
      options:
        - Gameplay / plugins
        - UI / UX
        - Stats / economy
        - Monetization
        - Persistence / DataStore
        - Dev tooling / harness
        - Documentation
        - Other
    validations:
      required: true

  - type: checkboxes
    id: scope
    attributes:
      label: Scope awareness
      options:
        - label: I understand large features may be deferred to roadmap milestones
          required: false
